# golangci-lint configuration for wj-tui (v2 format — https://golangci-lint.run).
# Kept conservative so it stays a meaningful gate rather than a source of churn.
# errcheck, govet, ineffassign, staticcheck and unused are on by default in v2
# (staticcheck absorbs the old gosimple), so we only add the extra linters here.
version: "2"

linters:
  enable:
    - misspell    # common spelling mistakes in comments/strings
    - unconvert   # redundant type conversions

formatters:
  enable:
    - gofmt       # flag code that isn't gofmt-clean

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
